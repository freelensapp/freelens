name: Unit tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-unit:
    name: unit tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})

    strategy:
      fail-fast: false
      matrix:
        # Each shard runs on its own runner, so the count is a wall-clock
        # parallelism choice, not a per-runner resource bound. The shard
        # denominator is derived from strategy.job-total to stay in sync.
        shard: [1, 2, 3, 4]

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60

    env:
      DO_NOT_TRACK: "1"
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      TURBOREPO_CACHE: ${{ github.workspace }}/.turbo

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Setup pnpm
        run: corepack enable

      - name: Get pnpm cache directory
        shell: bash
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> ${GITHUB_ENV}

      - name: Use pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.pnpm_cache_dir }}
          key: ubuntu-24.04-arm-arm64-node-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ubuntu-24.04-arm-arm64-node-

      - name: Use Turborepo cache
        uses: actions/cache@v6
        with:
          path: ${{ env.TURBOREPO_CACHE }}
          key: ubuntu-24.04-arm-arm64-turborepo-${{ hashFiles('package.json', 'freelens/package.json', 'packages/**/package.json', 'pnpm-lock.yaml','turbo.json','tsconfig*.json','packages/infrastructure/typescript/config/*.json') }}
          restore-keys: |
            ubuntu-24.04-arm-arm64-turborepo-

      - name: Get Electron version
        shell: bash
        run: echo "electron_version=$(yq -r .importers.freelens.devDependencies.electron.version pnpm-lock.yaml | sed 's/(.*)//')" >> ${GITHUB_ENV}

      - name: Use Electron cache
        uses: actions/cache@v6
        with:
          path: ${{ env.ELECTRON_CACHE }}
          key: ubuntu-24.04-arm-arm64-electron-${{ env.electron_version }}

      - name: Install pnpm dependencies
        id: install-pnpm
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile
        continue-on-error: true

      - name: Install pnpm dependencies (retry)
        if: steps.install-pnpm.outcome == 'failure'
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile

      # Electron 42 downloads its runtime binary lazily on the first require(),
      # not during install. Without this step the parallel Vitest workers each
      # trigger the download and extraction at test time and clobber each other,
      # failing with "Electron failed to install correctly". Download and
      # extract it once, serially, here. electron/install.js reads its download
      # cache directory from electron_config_cache, so point it at the
      # GitHub-cached ELECTRON_CACHE restored above.
      - name: Install Electron binary
        working-directory: freelens
        env:
          electron_config_cache: ${{ env.ELECTRON_CACHE }}
        run: |
          node "$(node -p "require.resolve('electron/install.js')")"

      - name: Build packages
        run: pnpm --color=always --stream build

      # All package projects are sharded together through the root Vitest
      # config, which declares every package as a project. Vitest splits the
      # full set of collected test files across shards, so no project is
      # singled out and every shard runs a balanced slice of the whole suite.
      # --reporter=github-actions surfaces failing tests as inline annotations
      # on the PR/commit; --includeTaskLocation gives them accurate file:line.
      # verbose keeps a full per-test log in the shard's job output.
      - name: Run unit tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: pnpm --color=always test:unit --shard=${{ matrix.shard }}/${{ strategy.job-total }} --reporter=verbose --reporter=github-actions --includeTaskLocation

      # Recursive/--parallel commands skip the workspace root by default, so
      # calling `pnpm --parallel run clean` here bypassed the root package's
      # `clean` script entirely - including the dlx cache warmup it runs
      # before the parallel per-package `rimraf` calls (#2231). Without that
      # warmup, ~30 packages race to set up the same pnpm dlx cache slot for
      # rimraf@6.1.3 at once, and one process unlinks the dlx `pkg` symlink
      # out from under another, failing with ENOENT. Running the root
      # `clean` script (which does the warmup, then `pnpm -r clean`) keeps
      # the warmup in the critical path while still cleaning packages
      # recursively.
      - name: Clean after tests
        run: pnpm --color=always run clean

      - name: Check untracked files
        shell: bash
        run: for f in $(git ls-files --others --exclude-standard); do git diff --no-index --stat --exit-code /dev/null $f; done
