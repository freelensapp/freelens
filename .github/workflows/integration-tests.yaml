name: Integration tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  kind_version: 0.32.0 # datasource=github-releases depName=kubernetes-sigs/kind
  kubernetes_version: 1.36.1 # datasource=docker depName=kindest/node

jobs:
  test-integration:
    name: integration tests on ${{ matrix.runs-on }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # - runs-on: ubuntu-24.04
          #   os: linux
          #   arch: x64

          - runs-on: ubuntu-24.04-arm
            os: linux
            arch: arm64

          - runs-on: macos-15
            os: macos
            arch: arm64

          # - runs-on: macos-15-intel
          #   os: macos
          #   arch: x64

          # - runs-on: windows-11-arm
          #   os: windows
          #   arch: arm64

          - runs-on: windows-2025
            os: windows
            arch: x64

    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 60

    env:
      DO_NOT_TRACK: "1"
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      TURBOREPO_CACHE: ${{ github.workspace }}/.turbo

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install bash coreutils

      - name: Add coreutils to PATH (macOS)
        if: runner.os == 'macOS'
        run: echo "/usr/local/opt/coreutils/libexec/gnubin" >> $GITHUB_PATH

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          # Renovate keeps this version up to date via the inline datasource
          # hint below (see .renovaterc.json5 customManagers).
          YQ_VERSION: v4.53.3 # datasource=github-releases depName=mikefarah/yq
        run: |
          set -eo pipefail
          # winget/choco is not available on every Windows runner image (in
          # particular the windows-11-arm image used for the arm64 build), so
          # download the yq binary directly from the upstream GitHub release.
          # Pick the asset that matches the runner architecture. Expose the
          # install directory to later steps via GITHUB_PATH (Windows form,
          # which Git Bash re-converts to POSIX on startup) and prepend the
          # POSIX form to PATH here so the verification below can find yq.
          case "${{ matrix.arch }}" in
            arm64) yq_arch=arm64 ;;
            *) yq_arch=amd64 ;;
          esac
          yq_version="$YQ_VERSION"
          bin_dir="$HOME/bin"
          mkdir -p "$bin_dir"
          curl -fsSL -o "$bin_dir/yq.exe" \
            "https://github.com/mikefarah/yq/releases/download/${yq_version}/yq_windows_${yq_arch}.exe"
          cygpath --windows "$bin_dir" >> "$GITHUB_PATH"
          PATH="$bin_dir:$PATH"
          yq --version

      - name: Setup node
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Setup pnpm
        run: corepack enable

      - name: Get pnpm cache directory
        shell: bash
        run: echo "pnpm_cache_dir=$(pnpm store path)" | tee -a ${GITHUB_ENV}

      - name: Use pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.pnpm_cache_dir }}
          key: ${{ matrix.runs-on }}-${{ matrix.arch }}-node-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ matrix.runs-on }}-${{ matrix.arch }}-node-

      - name: Get Electron version
        shell: bash
        run: echo "electron_version=$(yq -r .importers.freelens.devDependencies.electron.version pnpm-lock.yaml | sed 's/(.*)//')" | tee -a $GITHUB_ENV

      - name: Get Electron Builder version
        shell: bash
        run: echo "electron_builder_version=$(yq -r .importers.freelens.devDependencies.electron-builder.version pnpm-lock.yaml | sed 's/(.*)//')" | tee -a $GITHUB_ENV

      - name: Use Electron cache
        uses: actions/cache@v6
        with:
          path: ${{ env.ELECTRON_CACHE }}
          key: ${{ matrix.runs-on }}-${{ matrix.arch }}-electron-${{ env.electron_version }}
          restore-keys: |
            ${{ matrix.runs-on }}-${{ matrix.arch }}-electron-

      - name: Use Electron Builder cache
        uses: actions/cache@v6
        with:
          path: ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ matrix.runs-on }}-${{ matrix.arch }}-electron-builder-${{ env.electron_builder_version }}
          restore-keys: |
            ${{ matrix.runs-on }}-${{ matrix.arch }}-electron-builder-

      - name: Use Turborepo cache
        uses: actions/cache@v6
        with:
          path: ${{ env.TURBOREPO_CACHE }}
          key: ${{ matrix.runs-on }}-${{ matrix.arch }}-turborepo-${{ hashFiles('package.json', 'freelens/package.json', 'packages/**/package.json', 'pnpm-lock.yaml','turbo.json','tsconfig*.json','packages/infrastructure/typescript/config/*.json') }}
          restore-keys: |
            ${{ matrix.runs-on }}-${{ matrix.arch }}-turborepo-

      # Cache the .deb archives and package lists that `playwright install-deps`
      # downloads through apt, so re-runs reuse them instead of re-downloading.
      # apt is pointed at this project-local directory via a global config file
      # written in the install step below.
      - name: Use APT cache (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v6
        with:
          path: .apt
          key: ${{ matrix.runs-on }}-${{ matrix.arch }}-apt-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ matrix.runs-on }}-${{ matrix.arch }}-apt-

      - name: Start KinD cluster (Linux)
        if: runner.os == 'Linux'
        uses: helm/kind-action@v1
        with:
          cluster_name: freelens
          version: v${{ env.kind_version }}
          node_image: kindest/node:v${{ env.kubernetes_version }}
          wait: 5m

      - name: Install pnpm dependencies
        id: install-pnpm
        shell: bash
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        continue-on-error: true

      - name: Install pnpm dependencies (retry)
        if: steps.install-pnpm.outcome == 'failure'
        shell: bash
        run: timeout 300 pnpm install --color=always --prefer-offline --frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Disable pre post scripts for pnpm
        shell: bash
        run: pnpm config set enablePrePostScripts false --location project

      - name: Put $HOME in env (Windows)
        if: runner.os == 'windows'
        run: echo "HOME=$HOME" | Out-File -FilePath $env:GITHUB_ENV -Append

      # The integration tests drive the packaged Electron app via Playwright's
      # `_electron` API, which uses Electron's own bundled Chromium, so
      # Playwright's browsers are never downloaded. `install-deps` is still
      # needed on Linux: it apt-installs the shared libraries that Chromium (and
      # thus the Electron app) needs to launch under xvfb. Scope it to `chromium`
      # so only Chromium's libraries are installed, skipping the heavier
      # Firefox/WebKit dependency set that the Electron app never uses.
      - name: Install Playwright's OS dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eo pipefail
          # `playwright install-deps` runs its own `apt-get update`/`install`, so
          # the archive/list redirect has to be a global apt config file it picks
          # up rather than per-invocation `-o` flags. Point apt at the cached
          # project-local dirs (see the APT cache step above); dpkg's status stays
          # at the system default, so packages still install into the runner.
          mkdir -p .apt/cache/archives/partial .apt/state/lists/partial
          sudo tee /etc/apt/apt.conf.d/00freelens-cache >/dev/null <<EOF
          Dir::Cache::archives "$PWD/.apt/cache/archives";
          Dir::State::lists "$PWD/.apt/state/lists";
          EOF
          pnpx playwright install-deps chromium
          # apt ran as root, so hand the cache dir back to the runner user for the
          # cache-save post step to read.
          sudo chown -R "$(id -u):$(id -g)" .apt

      - name: Build packages
        if: runner.os != 'Windows'
        run: pnpm --color=always --stream build

      # STATUS_DLL_INIT_FAILED (0xC0000142) intermittently crashes turbo's
      # child build processes on the GitHub-hosted Windows runners when the
      # build fans out across all packages at once (see issue #105). Cap
      # turbo's concurrency on Windows to lower the parallelism and memory
      # pressure that trigger the crash; other platforms keep turbo's default.
      - name: Build packages (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: pnpm --color=always --stream build
        env:
          TURBO_CONCURRENCY: "2"

      - name: Build extra resources
        id: build-resources
        run: pnpm --color=always build:resources
        continue-on-error: true

      - name: Build extra resources (retry)
        id: build-resources-2
        if: steps.build-resources.outcome == 'failure'
        run: pnpm --color=always build:resources
        continue-on-error: true

      - name: Build extra resources (retry 2)
        if: steps.build-resources-2.outcome == 'failure'
        run: pnpm --color=always build:resources

      - name: Get electron-builder path
        shell: bash
        run: |
          EB_PATH=$(cd freelens && node -e "console.log(require.resolve('electron-builder/cli'))")
          echo "ELECTRON_BUILDER_PATH=$EB_PATH" | tee -a $GITHUB_ENV

      - name: Deploy production node_modules
        shell: bash
        run: |
          pnpm deploy --legacy --prod --filter=freelens freelens/node_modules_prod
          mv freelens/node_modules freelens/node_modules_dev
          mv freelens/node_modules_prod freelens/node_modules

      - name: Build Electron app
        shell: bash
        working-directory: freelens
        run: node "$ELECTRON_BUILDER_PATH" --publish never --${{ matrix.os }} dir --${{ matrix.arch }}
        env:
          npm_config_user_agent: pnpm

      - name: Verify app.asar
        shell: bash
        run: |
          set -eo pipefail
          found=0
          while IFS= read -r asar; do
            tmpdir=$(mktemp -d)
            echo "::group::asar extract ${asar}"
            pnpm dlx @electron/asar extract "${asar}" "${tmpdir}"
            echo "::endgroup::"
            rm -rf "${tmpdir}"
            found=$((found + 1))
          done < <(find freelens/dist -type f -name app.asar)
          if [[ "${found}" -eq 0 ]]; then
            echo "No app.asar found under freelens/dist" >&2
            exit 1
          fi

      - name: Restore dev node_modules
        shell: bash
        run: |
          mv freelens/node_modules freelens/node_modules_prod
          mv freelens/node_modules_dev freelens/node_modules

      # Produce the SBOM and runtime package list only for the real branch build
      # (push/dispatch on main), never for PRs. The combine-and-scan job below
      # consumes both as run artifacts.
      - name: Create SBOM
        if: github.ref_name == 'main' && github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: "freelens/dist/${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}-sbom.spdx.json"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-name: "${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}-sbom.spdx.json"
          upload-release-assets: false

      - name: Create runtime package list
        if: github.ref_name == 'main' && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -eo pipefail
          # Assemble a production-only dependency tree (no devDependencies) from
          # the already-populated pnpm store, then map each runtime package
          # <name>@<version> to its path in the pnpm store. security-scan uses the
          # keys as the runtime closure (to drop build-time findings) and the
          # paths as the code-scanning location for npm findings (grype otherwise
          # reports them against pnpm-lock.yaml). --legacy is required because the
          # workspace does not set inject-workspace-packages.
          deploy_dir="$RUNNER_TEMP/freelens-prod"
          rm -rf "$deploy_dir"
          pnpm --filter freelens deploy --prod --legacy --ignore-scripts "$deploy_dir"
          os="${{ matrix.os }}"
          arch="${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}"
          out="freelens/dist/${{ github.event.repository.name }}-${os}-${arch}-prod-packages.json"
          (
            cd "$deploy_dir"
            printf 'key\tvalue\n'
            for d in node_modules/.pnpm/*/; do
              d="${d#node_modules/.pnpm/}"
              d="${d%/}"
              [ "$d" = "node_modules" ] && continue
              # dir name is <name>@<version>[_<peer>]; drop the peer suffix and
              # decode the scoped-package separator (@scope+name -> @scope/name).
              key="${d%%_*}"
              key="${key/+//}"
              printf '%s\t%s\n' "$key" "node_modules/.pnpm/$d/node_modules/${key%@*}"
            done
          ) | yq -pt -oj '.[] as $i ireduce ({}; . * {$i.key: $i.value})' > "$out"
          echo "runtime packages: $(yq -pj -oj 'length' "$out")"

      - name: Upload runtime package list
        if: github.ref_name == 'main' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: "${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}-prod-packages.json"
          path: "freelens/dist/${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch == 'x64' && 'amd64' || matrix.arch }}-prod-packages.json"

      - name: Run integration tests (Linux)
        id: integration-tests-linux
        if: runner.os == 'Linux'
        run: |
          sudo chown root:root freelens/dist/linux*-unpacked/chrome-sandbox
          sudo chmod 4755 freelens/dist/linux*-unpacked/chrome-sandbox
          timeout 600 xvfb-run -a pnpm --color=always test:integration --reporter=verbose --reporter=github-actions --includeTaskLocation
        env:
          DEBUG: pw:browser
          TEST_KIND_CLUSTER_NAME: freelens
        continue-on-error: true

      - name: Run integration tests (Linux) (retry)
        if: runner.os == 'Linux' && steps.integration-tests-linux.outcome == 'failure'
        run: |
          sudo chown root:root freelens/dist/linux*-unpacked/chrome-sandbox
          sudo chmod 4755 freelens/dist/linux*-unpacked/chrome-sandbox
          timeout 600 xvfb-run -a pnpm --color=always test:integration --reporter=verbose --reporter=github-actions --includeTaskLocation
        env:
          DEBUG: pw:browser

      - name: Run integration tests (macOS)
        id: integration-tests-macos
        if: runner.os == 'macOS'
        shell: bash
        run: timeout 600 pnpm --color=always test:integration --reporter=verbose --reporter=github-actions --includeTaskLocation
        env:
          DEBUG: pw:browser
        continue-on-error: true

      - name: Run integration tests (macOS) (retry)
        if: runner.os == 'macOS' && steps.integration-tests-macos.outcome == 'failure'
        shell: bash
        run: timeout 600 pnpm --color=always test:integration --reporter=verbose --reporter=github-actions --includeTaskLocation
        env:
          DEBUG: pw:browser

      - name: Run integration tests (Windows)
        id: integration-tests-windows
        if: runner.os == 'Windows'
        shell: bash
        run: timeout 600 pnpm --color=always test:integration --reporter=verbose --reporter=github-actions --includeTaskLocation
        env:
          DEBUG: pw:browser
          EXTENSION_PATH: skip
        continue-on-error: true

      - name: Run integration tests (Windows) (retry)
        if: runner.os == 'Windows' && steps.integration-tests-windows.outcome == 'failure'
        shell: bash
        run: timeout 600 pnpm --color=always test:integration --reporter=verbose --reporter=github-actions --includeTaskLocation
        env:
          DEBUG: pw:browser
          EXTENSION_PATH: skip

  security-scan:
    name: security scan

    # Combines the per-arch SBOMs and runtime package lists produced by the
    # test-integration matrix (both pulled as run artifacts) and scans only the
    # runtime dependency closure. Runs for the real branch build (push/dispatch
    # on main) only, never for PRs.
    if: github.ref_name == 'main' && github.event_name != 'pull_request'

    needs:
      - test-integration

    runs-on: ubuntu-24.04-arm

    permissions:
      actions: read
      contents: read
      security-events: write

    env:
      # Renovate keeps this version up to date via the inline datasource hint
      # below (see .renovaterc.json5 customManagers).
      GRYPE_VERSION: v0.116.0 # datasource=github-releases depName=anchore/grype

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download SBOMs
        uses: actions/download-artifact@v8
        with:
          pattern: "*-sbom.spdx.json"
          path: sboms
          merge-multiple: true

      - name: Download runtime package lists
        uses: actions/download-artifact@v8
        with:
          pattern: "*-prod-packages.json"
          path: prod
          merge-multiple: true

      - name: Install Grype
        id: grype
        uses: anchore/scan-action/download-grype@v7
        with:
          grype-version: ${{ env.GRYPE_VERSION }}
          cache-db: true

      - name: Scan SBOMs with Grype
        run: |
          set -eo pipefail
          grype="${{ steps.grype.outputs.cmd }}"
          mkdir -p sarifs
          shopt -s nullglob
          # Merge the per-arch runtime package maps (from test-integration) into
          # one <name>@<version> -> pnpm-store-path object. Only runtime findings
          # are reported: npm packages in this map, plus non-npm packages (Go
          # modules, native binaries) shipped under freelens/dist or
          # freelens/binaries. This drops build-time dev tools (esbuild,
          # typescript, ...) and the Go binaries bundled with them, which never
          # reach users.
          yq ea -pj -oj '. as $i ireduce ({}; . * $i)' prod/*-prod-packages.json > prod-set.json
          if [[ "$(yq -pj -oj 'length' prod-set.json)" -eq 0 ]]; then
            echo "Runtime package set is empty - refusing to scan (every npm finding would be dropped)" >&2
            exit 1
          fi
          found=0
          for sbom in sboms/*-sbom.spdx.json; do
            name=$(basename "$sbom" .spdx.json)
            # Reduce the SBOM to runtime packages before scanning.
            yq -pj -oj '
              (load("prod-set.json")) as $set |
              .packages |= map(
                ( ((.externalRefs // []) | map(select(.referenceType == "purl")))[0].referenceLocator // "" ) as $purl |
                (.name + "@" + (.versionInfo // "")) as $key |
                ((.sourceInfo // "") | (capture("(?<p>/[^,]*)").p // "")) as $path |
                select(
                  (($purl | test("^pkg:npm/")) and ($set[$key] != null))
                  or
                  (($purl | test("^pkg:npm/") | not) and ($path | test("^/freelens/(dist|binaries)/")))
                )
              )
            ' "$sbom" > "runtime-${name}.spdx.json"
            all=$(yq -pj -oj '.packages | length' "$sbom")
            run=$(yq -pj -oj '.packages | length' "runtime-${name}.spdx.json")
            echo "::group::grype ${sbom} (${all} -> ${run} runtime packages)"
            "$grype" "sbom:runtime-${name}.spdx.json" -o sarif > "sarifs/${name}.sarif"
            echo "::endgroup::"
            found=$((found + 1))
          done
          if [[ "$found" -eq 0 ]]; then
            echo "No SBOM files found to scan under sboms/" >&2
            exit 1
          fi
          # grype leaves the SARIF artifact location empty for SBOM scans, which
          # code scanning rejects with "expected artifact location". For non-npm
          # packages (Go modules, native binaries) the SPDX sourceInfo carries a
          # real path, so build a <name>@<version> -> path map. Build it from the
          # filtered SBOMs so a package present in several binaries (e.g. the Go
          # stdlib in kubectl and in the dev-only tsc binary) maps to a shipped
          # location, not a dropped build-time one.
          yq ea -pj -oj -I0 '[.]' runtime-*.spdx.json |
            yq -pj -oj '
                [ .[].packages[]
                  | select(has("sourceInfo"))
                  | {
                      "key": (.name + "@" + (.versionInfo // "")),
                      "value": ((.sourceInfo | capture("(?<p>/[^,]*)").p) // "" | sub("^/"; ""))
                    }
                  | select(.value != "")
                ] | from_entries
              ' > sbom-paths.json
          # Code scanning accepts only one SARIF run per category, and the
          # per-architecture SBOMs differ (bundled kubectl/helm/proxy CLIs and
          # their Go modules, native npm build variants), so scan them all and
          # merge the runs into one: slurp the SARIFs into an array, union the
          # rules by id and concatenate + de-duplicate the results (grype gives
          # SBOM findings an empty location, so identical cross-arch findings
          # collapse cleanly). Then set each result's artifact location from the
          # finding's <name>@<version>: the pnpm-store path for npm packages, the
          # sourceInfo path for non-npm ones, and a synthetic
          # "sbom/<package>@<version>" as a last resort. Done after the dedup so
          # empty locations collapse first.
          yq ea -pj -oj -I0 '[.]' sarifs/*.sarif |
            yq -pj -oj '
                (load("prod-set.json")) as $prod |
                (load("sbom-paths.json")) as $paths |
                . as $x |
                {
                  "$schema": $x[0]["$schema"],
                  "version": $x[0].version,
                  "runs": [
                    {
                      "tool": {
                        "driver": (
                          $x[0].runs[0].tool.driver |
                          .rules = ([$x[].runs[0].tool.driver.rules[]] | unique_by(.id))
                        )
                      },
                      "results": (
                        [$x[].runs[0].results[]] |
                        unique |
                        map(
                          ((.message.text | capture("package: (?<n>.+?), version (?<v>.*?) was found at:")) // {"n": "unknown", "v": "unknown"}) as $p |
                          ($p.n + "@" + $p.v) as $key |
                          .locations[0].physicalLocation.artifactLocation.uri = ($prod[$key] // $paths[$key] // ("sbom/" + $key))
                        )
                      )
                    }
                  ]
                }
              ' > grype.sarif

      - name: Upload Grype SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype.sarif
          category: grype
