# Claude Code – on-demand assistant via @claude
# Location: .github/workflows/claude.yml (default branch)
# Requires:
#   - GitHub App "Claude" installed on the repo (https://github.com/apps/claude)
#   - Secret CLAUDE_CODE_OAUTH_TOKEN (org-level, generated with `claude setup-token`)
# Only users with write+ permission on the repo can trigger it (checked inside the action).
#
# Claude is constrained by its system prompt to only push to the PR branch
# it was invoked on (never main). For defense in depth, enable branch
# protection rules on the main branch (require PR + approvals).

name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest

    permissions:
      contents: write # allow Claude to push commits to the PR branch
      pull-requests: write # allow Claude to interact with PRs
      issues: write # allow Claude to comment on issues/PRs
      id-token: write # OIDC authentication for the Claude GitHub App
      actions: read # optional: allow Claude to read CI logs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout PR branch (workaround for claude-code-action not supporting PR events)
        if: github.event.issue.pull_request != null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin refs/pull/${{ github.event.issue.number }}/head
          git checkout FETCH_HEAD

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |-
            --max-turns 30
