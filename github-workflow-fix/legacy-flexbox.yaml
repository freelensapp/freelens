name: Legacy flexbox ratchet

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  legacy-flexbox:
    name: legacy-flexbox

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 5

    env:
      DO_NOT_TRACK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Check legacy flexbox ratchet
        run: node scripts/check-legacy-flexbox.mjs
