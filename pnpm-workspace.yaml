packages:
  - freelens
  - packages/**

catalog:
  react: ^19.2.8
  react-dom: ^19.2.8
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3

allowBuilds:
  '@parcel/watcher': true
  electron: true
  electron-winstaller: false
  esbuild: false
  node-pty: true
  sharp: true

engineStrict: true

overrides:
  '@types/http-proxy': '-'
  brace-expansion@^2.0.1: ^5.0.7
  compression: ^1.8.1
  form-data: ^4.0.6
  http-proxy: npm:http-proxy-node16@^1.0.6
  http-proxy-middleware: ^3.0.7
  mobx-react: ^9.1.1
  tmp@^0.2.0: ^0.2.7

peerDependencyRules:
  allowedVersions:
    mobx-react: '9'

patchedDependencies:
  '@async-fn/vitest': patches/@async-fn__vitest.patch
  '@xterm/xterm@6.0.0': patches/@xterm__xterm@6.0.0.patch

shellEmulator: true

minimumReleaseAgeExclude:
  - react-dom@19.2.8
  - react@19.2.8
