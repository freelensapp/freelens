
packages:
  - freelens
  - packages/**
allowBuilds:
  '@parcel/watcher': true
  electron: true
  electron-winstaller: true
  node-pty: true
  sharp: true

engineStrict: true

nodeGyp: ../../../../node-gyp/bin/node-gyp.js

overrides:
  '@types/http-proxy': '-'
  brace-expansion@^2.0.1: ^2.1.1
  compression: ^1.8.1
  form-data: ^4.0.6
  http-proxy: npm:http-proxy-node16@^1.0.6
  http-proxy-middleware: ^3.0.7
  tmp@^0.2.0: ^0.2.7

patchedDependencies:
  '@async-fn/vitest': patches/@async-fn__vitest.patch
  '@xterm/xterm@6.0.0': patches/@xterm__xterm@6.0.0.patch
  circular-dependency-plugin: patches/circular-dependency-plugin.patch

publicHoistPattern:
  - node-gyp

shellEmulator: true
